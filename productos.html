<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Florería Romero | Productos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="header">
    <div class="logo">
      <h1>Florería Romero</h1>
      <p>Catálogo de productos</p>
    </div>

    <nav class="nav">
      <a href="index.html">Inicio</a>
      <a class="active" href="productos.html">Productos</a>
      <a href="servicios.html">Servicios</a>
      <a href="contacto.html">Contacto</a>
    </nav>
  </header>

  <main class="container">

    <!-- SECCIÓN 1 -->
    <section class="section">
      <h2>💐 Ramos y Bouquets</h2>
      <p>Opciones para cumpleaños, aniversarios y regalos sorpresa.</p>

      <!-- 6 IMÁGENES -->
      <div class="grid">
        <figure class="card">
          <img src="MIS IMAGENES/ramo clasico.png" alt="Ramo 1">
          <figcaption>Ramo Clásico</figcaption>
        </figure>
        <figure class="card">
          <img src="MIS IMAGENES/Bouquet pastel.png" alt="Ramo 2">
          <figcaption>Bouquet Pastel</figcaption>
        </figure>
        <figure class="card">
          <img src="MIS IMAGENES/rosas rojas.png" alt="Ramo 3">
          <figcaption>Rosas Rojas</figcaption>
        </figure>
        <figure class="card">
          <img src="MIS IMAGENES/mix de flores.png" alt="Ramo 4">
          <figcaption>Mix de Flores</figcaption>
        </figure>
        <figure class="card">
          <img src="MIS IMAGENES/elegante blanco.png" alt="Ramo 5">
          <figcaption>Elegante Blanco</figcaption>
        </figure>
        <figure class="card">
          <img src="MIS IMAGENES/primavera viva.png" alt="Ramo 6">
          <figcaption>Primavera Viva</figcaption>
        </figure>
      </div>
    </section>

    <!-- SECCIÓN 2 -->
    <section class="section">
      <h2>🎁 Cajas y Detalles</h2>
      <p>Cajas con flores, peluches, chocolates y mensajes personalizados.</p>

      <div class="grid">
        <figure class="card">
          <img src="MIS IMAGENES/caja premium.png" alt="Caja 1">
          <figcaption>Caja Premium</figcaption>
        </figure>
        <figure class="card">
          <img src="MIS IMAGENES/caja romantica.png" alt="Caja 2">
          <figcaption>Caja Romántica</figcaption>
        </figure>
        <figure class="card">
          <img src="MIS IMAGENES/rosas&carta.png" alt="Caja 3">
          <figcaption>Rosas & Carta</figcaption>
        </figure>
        <figure class="card">
          <img src="MIS IMAGENES/color especial.png" alt="Caja 4">
          <figcaption>Color Especial</figcaption>
        </figure>
        <figure class="card">
          <img src="MIS IMAGENES/mix primavera.png" alt="Caja 5">
          <figcaption>Mix Primavera</figcaption>
        </figure>
        <figure class="card">
          <img src="MIS IMAGENES/Box Girasoles.png" alt="Caja 6">
          <figcaption>Box Girasoles </figcaption>
        </figure>
      </div>
    </section>

  </main>

  <footer class="footer">
    <p>© 2026 Florería Romero</p>
  </footer>

</body>
</html>
