<!DOCTYPE html>

  <header class="header">
    <div class="logo">
      <h1>Florería Romero</h1>

    <nav class="nav">

  <main class="container">
    <section class="section">
      <h2>📩 Envíanos un mensaje</h2>

      <form class="form">
        <label>Nombre
          <input type="text" placeholder="Tu nombre" required>
        </label>

        <label>Correo
          <input type="email" placeholder="tucorreo@gmail.com" required>
        </label>

        <label>Mensaje
          <textarea rows="5" placeholder="Escribe tu mensaje..." required></textarea>
        </label>

        <button class="btn" type="submit">Enviar</button>
      </form>
    </section>

    <section class="section">
      <h2>📍 Ubicación</h2>
      <p>Tarma - Jr. Moquegua #415</p>
      <p>Teléfono: +51 902 905 537</p>
      <p>WhatsApp: +51 995 039 233</p>
    </section>
  </main>

  <footer class="footer">
    <p>© 2026 Florería Romero</p>
  </footer>

</body>
</html>
